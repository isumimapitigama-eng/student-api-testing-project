<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management UI</title>
     <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input, button { margin: 5px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f4f4f4; }
  </style>
</head>
<body>
    <h1>Student Management</h1>

  <h3>Add New Student</h3>
  <input type="text" id="name" placeholder="Name">
  <input type="number" id="age" placeholder="Age">
  <input type="text" id="major" placeholder="Major">
  <button onclick="addStudent()">Add Student</button>

  <h3>All Students</h3>
  <table id="students-table">
    <thead>
      <tr><th>ID</th><th>Name</th><th>Age</th><th>Major</th><th>Actions</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const API_URL = 'http://127.0.0.1:5000/students';

    function loadStudents() {
      fetch(API_URL)
        .then(res => res.json())
        .then(data => {
          const tbody = document.querySelector("#students-table tbody");
          tbody.innerHTML = '';
          data.forEach(student => {
            const row = `
              <tr>
                <td>${student.id}</td>
                <td><input value="${student.name}" onchange="updateStudentField(${student.id}, 'name', this.value)"></td>
                <td><input value="${student.age}" onchange="updateStudentField(${student.id}, 'age', this.value)"></td>
                <td><input value="${student.major}" onchange="updateStudentField(${student.id}, 'major', this.value)"></td>
                <td><button onclick="deleteStudent(${student.id})">Delete</button></td>
              </tr>`;
            tbody.innerHTML += row;
          });
        });
    }

    function addStudent() {
      const name = document.getElementById('name').value;
      const age = parseInt(document.getElementById('age').value);
      const major = document.getElementById('major').value;

      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, age, major })
      })
      .then(() => {
        document.getElementById('name').value = '';
        document.getElementById('age').value = '';
        document.getElementById('major').value = '';
        loadStudents();
      });
    }

    function updateStudentField(id, field, value) {
      fetch(`${API_URL}/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [field]: field === 'age' ? parseInt(value) : value })
      })
      .then(() => loadStudents());
    }

    function deleteStudent(id) {
      fetch(`${API_URL}/${id}`, { method: 'DELETE' })
        .then(() => loadStudents());
    }

    loadStudents();
  </script>
</body>
</html>
